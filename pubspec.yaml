name: campus_bridge
description: "YONSEI BRIDGE - Campus support platform for international students at Yonsei University Mirae Campus"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Core Firebase packages (LOCKED versions)
  firebase_core: 3.6.0
  cloud_firestore: 5.4.3
  firebase_storage: 12.3.2
  firebase_messaging: 15.1.3
  firebase_analytics: 11.3.3

  # State management and networking
  provider: 6.1.5+1
  http: 1.5.0

  # Local storage
  shared_preferences: 2.5.3
  hive: 2.2.3
  hive_flutter: 1.1.0

  # Image handling
  image_picker: 1.1.2
  cached_network_image: 3.4.1

  # Permissions
  permission_handler: 11.3.1

  # UI components
  cupertino_icons: ^1.0.8
  intl: 0.19.0
  url_launcher: 6.3.1
  
  # Charts and data visualization
  fl_chart: 0.69.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icon/
  
  fonts:
    - family: NotoSansKR
      fonts:
        - asset: fonts/NotoSansKR-Regular.ttf
